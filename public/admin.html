<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNULL — Admin Panel</title>
    <meta name="description" content="Admin panel for managing the KNULL app vault.">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg-aurora"></div>

    <header class="main-header">
        <div class="header-left">KNULL</div>
        <div class="header-center">
            <p class="header-warning">⚠ This is a private platform. Do not share or misuse the content.</p>
        </div>
    </header>

    <div class="layout-wrapper">
        <div class="page-content">
            <div class="admin-section">

                <!-- Password Row -->
                <div class="password-row">
                    <label for="adminPassword">Admin Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter password…">
                </div>

                <!-- ===== APPS SECTION ===== -->
                <div>
                    <div class="section-header">
                        <h2>Add / Edit App</h2>
                    </div>
                    <div class="card">
                        <form id="appForm">
                            <input type="hidden" id="appId">
                            <div class="form-row">
                                <input type="text" id="name" placeholder="App name" required>
                                <input type="text" id="description" placeholder="Short description">
                                <input type="text" id="link" placeholder="Download link" required>
                                <input type="text" id="image" placeholder="Image URL (optional)">
                            </div>
                            <button type="submit" class="btn btn-primary">Save App</button>
                        </form>
                    </div>
                </div>

                <div>
                    <div class="section-header">
                        <h2>Manage Apps</h2>
                    </div>
                    <div id="adminApps" class="grid"></div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border); margin: 4px 0;">

                <!-- ===== ACCOUNTS SECTION ===== -->
                <div>
                    <div class="section-header">
                        <h2>Add Emails (Bulk)</h2>
                    </div>
                    <div class="card">
                        <form id="accountForm">
                            <div class="form-row">
                                <label for="bulkEmails"
                                    style="font-size: 0.82rem; color: var(--text-muted); margin-bottom: 2px;">Paste
                                    emails
                                    (separated by commas or newlines)</label>
                                <textarea id="bulkEmails"
                                    placeholder="example1@gmail.com&#10;example2@yahoo.com&#10;example3@outlook.com"
                                    required style="min-height: 120px; resize: vertical;"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary"
                                style="background: var(--success); border-color: var(--success);">Save Emails</button>
                        </form>
                    </div>
                </div>

                <div>
                    <div class="section-header">
                        <h2>Manage Accounts</h2>
                    </div>
                    <div id="adminAccountStats" class="stats-bar" style="display: none;"></div>
                    <div id="adminAccounts" class="grid"></div>
                </div>

            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-label">Navigate</div>
            <a href="/">Apps</a>
            <a href="/accounts">Accounts</a>
            <div class="sidebar-label">Settings</div>
            <button id="themeToggle" title="Toggle theme">🌙 Theme</button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>

</html>
