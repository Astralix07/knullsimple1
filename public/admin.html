<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNULL — Admin Panel</title>
    <meta name="description" content="Admin panel for managing the KNULL app vault.">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="header-left">KNULL</div>
        <div class="header-center">
            <p>This is a private platform. Please avoid sharing or misusing the content.</p>
        </div>
        <div class="header-right">
            <button id="themeToggle" title="Toggle theme">🌙</button>
            <a href="/">Apps</a>
            <a href="/accounts">Accounts</a>
        </div>
    </header>

    <div class="page-content">
        <div class="admin-section">

            <!-- Password Row -->
            <div class="password-row">
                <label for="adminPassword">Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter password…">
            </div>

            <!-- ===== APPS SECTION ===== -->
            <div>
                <div class="section-header">
                    <h2>Add / Edit App</h2>
                </div>
                <div class="card">
                    <form id="appForm">
                        <input type="hidden" id="appId">
                        <div class="form-row">
                            <input type="text" id="name" placeholder="App name" required>
                            <input type="text" id="description" placeholder="Short description">
                            <input type="text" id="link" placeholder="Download link" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Save App</button>
                    </form>
                </div>
            </div>

            <div>
                <div class="section-header">
                    <h2>Manage Apps</h2>
                </div>
                <div id="adminApps" class="grid"></div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

            <!-- ===== ACCOUNTS SECTION ===== -->
            <div>
                <div class="section-header">
                    <h2>Add Emails (Bulk)</h2>
                </div>
                <div class="card">
                    <form id="accountForm">
                        <div class="form-row">
                            <label for="bulkEmails"
                                style="font-size: 0.82rem; color: var(--text-muted); margin-bottom: 2px;">Paste emails
                                (separated by commas or newlines)</label>
                            <textarea id="bulkEmails"
                                placeholder="example1@gmail.com&#10;example2@yahoo.com&#10;example3@outlook.com"
                                required
                                style="width: 100%; min-height: 120px; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: monospace; font-size: 0.875rem; resize: vertical;"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary"
                            style="background: var(--success); border-color: var(--success);">Save Emails</button>
                    </form>
                </div>
            </div>

            <div>
                <div class="section-header">
                    <h2>Manage Accounts</h2>
                </div>
                <div id="adminAccounts" class="grid"></div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
