<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNULL — App Vault</title>
    <meta name="description" content="A private app launcher dashboard. Browse and download apps.">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg-aurora"></div>

    <header class="main-header">
        <div class="header-left">KNULL</div>
        <div class="header-center">
            <p class="header-warning">⚠ This is a private platform. Do not share or misuse the content.</p>
        </div>
    </header>

    <div class="layout-wrapper">
        <div class="page-content">
            <div class="page-title">App Vault</div>

            <div id="loading" class="loader-container">
                <div class="loader"></div>
            </div>

            <div id="apps" class="grid"></div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-label">Navigate</div>
            <a href="/accounts">Accounts</a>
            <a href="/admin">Admin</a>
            <div class="sidebar-label">Settings</div>
            <button id="themeToggle" title="Toggle theme">🌙 Theme</button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>

</html>
